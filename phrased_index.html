<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Phrased — AI Reply Assistant</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #0f0f0f;
      color: #fff;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 40px 24px;
    }
    .badge {
      background: rgba(255,255,255,0.08);
      border: 1px solid rgba(255,255,255,0.12);
      border-radius: 20px;
      padding: 6px 16px;
      font-size: 13px;
      color: rgba(255,255,255,0.6);
      letter-spacing: 0.5px;
      margin-bottom: 32px;
    }
    h1 {
      font-size: clamp(40px, 8vw, 72px);
      font-weight: 800;
      text-align: center;
      line-height: 1.1;
      letter-spacing: -1.5px;
      margin-bottom: 20px;
    }
    h1 span {
      background: linear-gradient(135deg, #f5a623, #ff6b35);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }
    p {
      font-size: 18px;
      color: rgba(255,255,255,0.55);
      text-align: center;
      max-width: 480px;
      line-height: 1.6;
      margin-bottom: 48px;
    }
    .store-btn {
      display: inline-flex;
      align-items: center;
      gap: 10px;
      background: #fff;
      color: #0f0f0f;
      border-radius: 14px;
      padding: 14px 28px;
      font-size: 16px;
      font-weight: 700;
      text-decoration: none;
      transition: opacity 0.2s;
    }
    .store-btn:hover { opacity: 0.85; }
    .store-btn svg { width: 22px; height: 22px; }
    footer {
      position: fixed;
      bottom: 24px;
      display: flex;
      gap: 24px;
    }
    footer a {
      font-size: 13px;
      color: rgba(255,255,255,0.3);
      text-decoration: none;
    }
    footer a:hover { color: rgba(255,255,255,0.6); }
  </style>
</head>
<body>
  <div class="badge">Available on Android</div>
  <h1>Text better.<br><span>Reply smarter.</span></h1>
  <p>Phrased floats over any chat app and suggests AI-powered replies tailored to your texting personality.</p>
  <a class="store-btn" href="https://play.google.com/store/apps/details?id=com.phrased.app">
    <svg viewBox="0 0 24 24" fill="currentColor">
      <path d="M3.18 23.76a2 2 0 0 0 2.07-.22l12.47-7.22-2.83-2.83L3.18 23.76zM.1 1.05C.04 1.3 0 1.57 0 1.86v20.28c0 .29.04.56.1.81l11.4-11.4L.1 1.05zM20.75 10.12l-2.96-1.71-3.17 3.17 3.17 3.18 2.99-1.73a2.02 2.02 0 0 0 0-2.91zM5.25.46A2 2 0 0 0 3.18.24L14.89 11.9l2.83-2.83L5.25.46z"/>
    </svg>
    Get it on Google Play
  </a>
  <footer>
    <a href="/privacy.html">Privacy Policy</a>
    <a href="mailto:support@phrased.app">Contact</a>
  </footer>
</body>
</html>
